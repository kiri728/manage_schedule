<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>スケジュール管理</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>スケジュール</h1>

        <imput type="text" id="search" placeholder="名前検索"></imput>
        
        <div id="main-page">
            <div class="button-area" style="display:block;">
                <button id="input_button" onclick="openform();">+</botton>
            </div>

            <div class="table-area" style="display:block;">
                <table id="schedule">
                    <thead>
                        <tr>
                            <th>日付</th>
                            <th>時間</th>
                            <th>内容</th>
                            <th>色</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-body">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="overlay" onclick="closeform()"></div>

        <div id="form-popup" style="display:none;">

            <button id="close-button" onclick="closeform()">×</button>

            <h2>予定追加</h2>

            <div id="input-area">
                <input type="date" id="date">
                <input type="time" id="time">
                <input type="text" id="title">
                <input type="color" id="color">
            </div>

            <br><br>

            <button id="add-button" onclick="closeform();addschedule();">追加</button>

        </div>
        <script src="script.js"></script>
    </body>
</html>
